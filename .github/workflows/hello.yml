# this is a workflow name
name: Hello workflow

on:
  push:
    branches: [main]

    paths: 
      -'**.html'
      
  workflow_dispatch: 

# these are jobs inside the workflow
jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Say hello to users
        run: echo "Hello dosto"

      - name: Say hello username
        run: echo "Hello $USER"

  details:
    runs-on: ubuntu-latest
    steps:
      - name: version of python ,docker etc
        run: docker --version && python --version
      
